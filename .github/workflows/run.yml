name: OY GDrive Runner

on:
  schedule:
    - cron: "17 3 * * *" # 매일 KST 14:01 (UTC 05:01)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GDRIVE_FOLDER_ID:  ${{ secrets.GDRIVE_FOLDER_ID }}
      GOOGLE_CLIENT_ID:  ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # [수정] 아래 설치 목록에 scrapling[fetchers] 를 명시적으로 주입했습니다.
          pip install requests beautifulsoup4 urllib3 playwright packaging scrapling[fetchers] \
                      google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          
          # [수정] Scrapling 전용 안티봇 브라우저 코어를 빌드 및 다운로드합니다.
          scrapling install
          python -m playwright install --with-deps chromium

      - name: Debug env presence
        run: |
          python - << 'PY'
          import os
          keys = [
              "GDRIVE_FOLDER_ID",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "GOOGLE_REFRESH_TOKEN",
              "SLACK_WEBHOOK_URL"
          ]
          for k in keys:
              v = os.getenv(k)
              print(k, "=", "SET" if v else "MISSING", "| length =", (len(v) if v else 0))
          PY

      - name: Run scraper
        run: python app.py

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oy-debug
          path: |
            rankings/**
            artifacts/**
          if-no-files-found: ignore
